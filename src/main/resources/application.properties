spring.application.name=PetConnectPDSW

api.security.token.secret=${JWT_SECRET:49160e7b88ab824dac4172cd15a28e0e}

spring.datasource.url=jdbc:h2:file:./data/petconnectdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.web.resources.static-locations=classpath:/static/
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.h2.console.enabled=true

# Multipart upload limits
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2500KB
