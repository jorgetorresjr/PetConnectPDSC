<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="body-login">
    <div class="container">
      <section id="section-login">
        <h2>Login</h2>
        <img src="img/Logo_PetConnect.png" alt="PetConnect" class="logo" />
        <form id="form-login">
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="senha" placeholder="Senha" required />
          <p id="recuperarSenha">
            <a href="#" id="link-recuperarSenha">Recuperar senha</a>
          </p>
          <button id="btnLogin" type="submit">Entrar</button>
          <p id="opcaoCadastro">
            Não tem conta? <a href="register.html" id="link-cadastro">Cadastre-se</a>
          </p>
        </form>
      </section>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
