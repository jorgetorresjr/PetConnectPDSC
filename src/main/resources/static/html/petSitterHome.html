<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetConnect - Área do Profissional</title>
    <link rel="stylesheet" href="../css/style.css?v=11">
</head>
<body class="petsitter-theme">

<nav class="navbar">
    <div class="nav-brand">
        <img src="../img/Logo_PetConnect.png" alt="Logo">
        <span>PetConnect</span>
    </div>
    <div class="nav-user-zone">
        <span><span id="userNameDisplay">Usuário</span> | Pet Sitter</span>
        <button id="btnLogout" class="btn btn-outline-secondary">Sair</button>
    </div>
</nav>

<div class="dashboard-container">
    <h1 class="page-title">Bem-vindo(a) de volta! 🐾</h1>
    <p class="page-subtitle">Gerencie sua agenda de atendimento e controle suas finanças.</p>

    <div class="metrics-grid">
        <div class="info-card">
            <h3>💰 Ganhos</h3>
            <p id="totalGanhos" class="metric-value">--</p>
        </div>
        <div class="info-card">
            <h3>📅 Agenda</h3>
            <p id="totalAgenda" class="metric-value">--</p>
        </div>
        <div class="info-card">
            <h3>🔔 Solicitações</h3>
            <p id="totalPendentes" class="metric-value">--</p>
        </div>
        <div class="info-card">
            <h3>✔ Concluídos</h3>
            <p id="totalConcluidos" class="metric-value">--</p>
        </div>
    </div>

    <div class="actions-group">
        <button id="criarPerfilBtn"> Criar Perfil</button>
        <button id="btnHistorico">Histórico de Agendamentos</button>
    </div>

    <hr class="hr-divider">

    <h2 class="section-heading">🔔 Solicitações de Atendimento Recebidas</h2>
    <p id="solicitacoesMsg" class="page-subtitle">Carregando novas solicitações...</p>
    
    <div id="solicitacoesLista" class="card-grid">
    </div>
</div>

<script src="../js/auth.js" defer></script>
<script src="../js/petSitterHome.js" defer></script>
</body>
</html>
