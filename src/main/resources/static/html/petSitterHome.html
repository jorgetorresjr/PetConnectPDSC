<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>PetConnect - Pet Sitter Home</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <h2>Bem-vindo(a), Pet Sitter!</h2> <img src="../img/Logo_PetConnect.png" alt="PetConnect" class="logo"
            style="max-width:120px;margin:0 auto 1rem auto;display:block;" /> <button id="btnLogout"
            style="margin-bottom:1rem;">Logout</button>
        <button id="criarPerfilBtn">Criar perfil</button>
        <button id="verPerfilBtn" style="display:none;">Ver perfil</button>

        <hr style="margin: 1.5rem 0;">

        <div style="display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap; margin-bottom:1rem;">
            <button id="btnHistorico">Histórico de agendamentos</button>
        </div>
        <h3 id="tituloLista">Solicitações recebidas</h3>
        <p id="solicitacoesMsg">Carregando solicitações...</p>
        <div id="solicitacoesLista"></div>
    </div>

    
    <script src="../js/petSitterHome.js" defer></script>
    <script src="../js/petSitterProfileStatus.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script>if (typeof setupLogoutButton === 'function') setupLogoutButton();</script>
</body>

</html>
