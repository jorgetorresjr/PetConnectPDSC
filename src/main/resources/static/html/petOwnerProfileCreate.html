<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Criar Perfil de Tutor</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="petOwnerProfileCreate.js" defer></script>
    <script src="../js/auth.js" defer></script>
    <script>if (typeof setupLogoutButton === 'function') setupLogoutButton();</script>
</head>
<body>
    <div class="container">
        <h2>Criar Perfil de Tutor</h2>
        <img src="../img/Logo_PetConnect.png" alt="PetConnect" class="logo" />
        <button id="btnLogout">Logout</button>
        <form id="petOwnerProfileForm" enctype="multipart/form-data">
            <label for="photo">Foto:</label>
            <input type="file" id="photo" name="photo" accept="image/*"><br>
            <button type="submit">Criar perfil</button>
        </form>
    </div>
</body>
</html>
