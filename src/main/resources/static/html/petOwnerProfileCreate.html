<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - PetConnect</title>
    <link rel="stylesheet" href="../css/style.css?v=12">
    <script src="../js/auth.js" defer></script>
    <script src="../js/petOwnerProfileCreate.js" defer></script>
</head>

<body>
<nav class="navbar">
    <div class="nav-brand">
        <img src="../img/Logo_PetConnect.png" alt="PetConnect">
        <span>PetConnect</span>
    </div>
    <div class="nav-user-zone">
        <span>👤 Tutor</span>
        <button id="btnLogout" class="btn-danger">
            Sair
        </button>
    </div>
</nav>

<div class="dashboard-container">
    <button class="btn-back" onclick="window.location.href='petOwnerHome.html'">
        ← Voltar
    </button>
    <div class="form-card">
        <h2 class="page-title">
            Meu Perfil
        </h2>
        <p class="page-subtitle">
            Atualize suas informações.
        </p>
        <form id="petOwnerProfileForm" enctype="multipart/form-data">
            <label>Nome</label>
            <input
                type="text"
                id="name"
                name="name" required minlength="3" maxlength="100">
            <label>Email</label>
            <input
                type="email"
                id="email"
                readonly>
            <label>Telefone</label>
            <input
                type="text"
                id="phone"
                name="phone"
                placeholder="(81) 99999-9999" minlength="8" maxlength="15">
            <label>Foto de Perfil</label>
            <input
                type="file"
                id="photo"
                name="photo"
                accept="image/*">
            <div style="text-align:center; margin-top:20px;">
                <img
                    id="preview"
                    src="../img/user.png"
                    alt="Foto"
                    style="width:140px;height:140px;border-radius:50%;object-fit:cover;border:2px solid #ddd;">
            </div>
            <button
                type="submit"
                class="btn-block mt-20">
                Salvar Alterações
            </button>
        </form>
    </div>
</div>
</body>
</html>
