<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Tutor - PetConnect</title>
    <link rel="stylesheet" href="../css/style.css?v=12">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/Logo_PetConnect.png" alt="Logo">
            <span>PetConnect</span>
        </div>
        <div class="nav-user-zone">
            <button id="btnLogout" class="btn-danger">Sair</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <button onclick="history.back()" class="btn-back">⬅ Voltar</button>
        
        <h1 class="page-title">Perfil do Tutor</h1>
        <p class="page-subtitle">Visualize suas informações.</p>

        <div id="perfilTutor" class="content-card">
            <p>Carregando...</p>
        </div>
    </div>

    <script src="../js/auth.js" defer></script>
    <script src="../js/petOwnerProfile.js" defer></script>
    <script>
        setTimeout(() => { if (typeof setupLogoutButton === 'function') setupLogoutButton(); }, 500);
    </script>
</body>
</html>
