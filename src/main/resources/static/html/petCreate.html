<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Pet - PetConnect</title>
    <link rel="stylesheet" href="../css/style.css?v=12">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <img src="../img/Logo_PetConnect.png" alt="Logo">
        <span>PetConnect</span>
    </div>

    <button id="btnLogout" class="btn-danger">Sair</button>
</nav>

<div class="dashboard-container">

    <button onclick="history.back()" class="btn-back">
        ⬅ Voltar
    </button>

    <div class="form-card">

        <h2 class="mb-25" style="text-align:center;">
            Cadastrar Novo Pet
        </h2>

        <form id="petCreateForm" enctype="multipart/form-data">

            <label for="nome">Nome:</label>
            <input
                type="text"
                id="nome"
                name="nome"
                required
                placeholder="Nome do seu pet"
                maxlength="100">

            <div class="form-grid">

                <div>
                    <label for="especie">Espécie:</label>
                    <input
                        type="text"
                        id="especie"
                        name="especie"
                        required
                        placeholder="Ex: Cachorro"
                        maxlength="50">
                </div>

                <div>
                    <label for="raca">Raça:</label>
                    <input
                        type="text"
                        id="raca"
                        name="raca"
                        required
                        placeholder="Ex: Poodle"
                        maxlength="50">
                </div>

            </div>

            <label for="idade">Idade:</label>
            <input
                type="number"
                id="idade"
                name="idade"
                required
                placeholder="Idade em anos"
                min="0"
                max="150">

            <label for="photo">Foto do Pet:</label>
            <input
                type="file"
                id="photo"
                name="photo"
                accept="image/*">

            <label for="observacoes">Observações:</label>
            <textarea
                id="observacoes"
                name="observacoes"
                rows="4"
                placeholder="Alergias, medicamentos, cuidados especiais..."
                maxlength="500"></textarea>

            <button
                type="submit"
                class="btn-block mt-20">
                Salvar Pet
            </button>

            <div id="pet-create-errors" style="display:none; background-color: #ffe0e0; color: rgb(4, 4, 4); padding: 12px; border-radius: 4px; margin-top: 15px; font-size: 14px; white-space: pre-line;"></div>

        </form>

    </div>

</div>
<script>
  // Validação em tempo real para limitar idade máxima
  document.getElementById("idade").addEventListener("input", function() {
    if (this.value && parseInt(this.value) > 150) {
      this.value = 150;
    }
  });
</script>
<script src="../js/auth.js"></script>
<script src="../js/petCreate.js"></script>

</body>
</html>
