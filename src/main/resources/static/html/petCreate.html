<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Pet - PetConnect</title>
    <link rel="stylesheet" href="../css/style.css?v=12">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <img src="../img/Logo_PetConnect.png" alt="Logo">
        <span>PetConnect</span>
    </div>

    <button id="btnLogout" class="btn-danger">Sair</button>
</nav>

<div class="dashboard-container">

    <button onclick="history.back()" class="btn-back">
        ⬅ Voltar
    </button>

    <div class="form-card">

        <h2 class="mb-25" style="text-align:center;">
            Cadastrar Novo Pet
        </h2>

        <form id="petCreateForm" enctype="multipart/form-data">

            <label for="name">Nome:</label>
            <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="Nome do seu pet">

            <div class="form-grid">

                <div>
                    <label for="specie">Espécie:</label>
                    <input
                        type="text"
                        id="specie"
                        name="specie"
                        required
                        placeholder="Ex: Cachorro">
                </div>

                <div>
                    <label for="breed">Raça:</label>
                    <input
                        type="text"
                        id="breed"
                        name="breed"
                        placeholder="Ex: Poodle">
                </div>

            </div>

            <label for="age">Idade:</label>
            <input
                type="number"
                id="age"
                name="age"
                required
                placeholder="Idade em anos">

            <label for="photo">Foto do Pet:</label>
            <input
                type="file"
                id="photo"
                name="photo"
                accept="image/*">

            <label for="observations">Observações:</label>
            <textarea
                id="observations"
                name="observations"
                rows="4"
                placeholder="Alergias, medicamentos, cuidados especiais..."></textarea>

            <button
                type="submit"
                class="btn-block mt-20">
                Salvar Pet
            </button>

        </form>

    </div>

</div>

<script src="../js/auth.js"></script>
<script src="../js/petCreate.js"></script>

</body>
</html>
