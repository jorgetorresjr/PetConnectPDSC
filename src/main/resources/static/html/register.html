<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - PetConnect</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-container" style="max-width: 700px;">
  <img src="../img/Logo_PetConnect.png" alt="PetConnect" class="logo" />
  <h1>Criar Conta</h1>

  <form id="form-register">
    <input type="text" id="name" placeholder="Nome completo" required />
    
    <div class="form-grid">
      <input type="email" id="emailRegister" placeholder="Email" required />
      <input type="password" id="passwordRegister" placeholder="Senha" required />
      <input type="text" id="cpfRegister" placeholder="CPF" required maxlength="14" />
      <input type="date" id="birthDateRegister" placeholder="Data de nascimento" required />
    </div>
    
    <input type="text" id="phoneRegister" placeholder="Telefone" required />
    
    <fieldset style="border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 15px; text-align: left;">
      <legend style="color: var(--primary); font-weight: bold; padding: 0 10px;">Endereço</legend>
      <input type="text" id="addressCep" placeholder="CEP" required maxlength="9" />
      
      <div class="form-grid">
        <input type="text" id="addressStreet" placeholder="Logradouro" required />
        <input type="number" id="addressNumber" placeholder="Número" required />
        <input type="text" id="addressComplement" placeholder="Complemento" />
        <input type="text" id="addressNeighborhood" placeholder="Bairro" required />
        <input type="text" id="addressCity" placeholder="Cidade" required />
        <input type="text" id="addressState" placeholder="Estado (UF)" maxlength="2" required />
      </div>
    </fieldset>

    <select id="roleRegister" required style="margin-bottom: 20px;">
      <option value="" disabled selected>Selecione o perfil desejado...</option>
      <option value="PO">🐶 Sou um Tutor (Procuro serviços)</option>
      <option value="PS">🐱 Sou Pet Sitter (Ofereço serviços)</option>
    </select>

    <button id="btnRegister" type="submit" class="btn-block">Cadastrar</button>
  </form>

  <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">

  <a href="login.html">Já possuo conta</a>
</div>

<script src="../js/auth.js"></script>
<script src="../js/register.js"></script>
<script>
    setTimeout(() => { if (typeof setupLogoutButton === 'function') setupLogoutButton(); }, 500);
</script>
</body>
</html>
