<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil Profissional - PetConnect</title>
    <link rel="stylesheet" href="../css/style.css?v=12">
</head>
<body class="petsitter-theme">

<nav class="navbar">
    <div class="nav-brand">
        <img src="../img/Logo_PetConnect.png">
        <span>PetConnect</span>
    </div>
    <button id="btnLogout" class="btn-danger">Sair</button>
</nav>

<div class="dashboard-container">
    <button onclick="history.back()" class="btn-back">⬅ Voltar</button>

    <div class="form-card">
        <h2 class="mb-25" style="text-align: center;">Complete seu Perfil Profissional</h2>
        <form id="petSitterProfileForm" enctype="multipart/form-data">
            
            <label>Especialidade Principal:</label>
            <input type="text" id="specialty" name="specialty" required placeholder="Ex: Especialista em cães de grande porte" maxlength="100">
            
            <label>Certificados / Formações:</label>
            <input type="text" id="certificates" name="certificates" placeholder="Ex: Curso de Primeiros Socorros" maxlength="200">
            
            <label>Serviços Oferecidos:</label>
            <div id="servicesCheckboxes" class="checkbox-grid">
                <label><input type="checkbox" name="services" value="1" data-name="Passeio"> Passeio</label>
                <label><input type="checkbox" name="services" value="2" data-name="Hospedagem"> Hospedagem</label>
                <label><input type="checkbox" name="services" value="3" data-name="Creche"> Creche</label>
                <label><input type="checkbox" name="services" value="4" data-name="Banho"> Banho</label>
                <label><input type="checkbox" name="services" value="5" data-name="Tosa"> Tosa</label>
                <label><input type="checkbox" name="services" value="6" data-name="Adestramento"> Adestramento</label>
            </div>
            
            <div id="servicePrices" class="mb-25">
                <small style="color: #666; display: block; margin-top: 10px;"></small>
            </div>

            <label>Dias da semana disponíveis:</label>
            <div class="checkbox-grid">
                <label><input type="checkbox" name="dias" value="Segunda"> Segunda</label>
                <label><input type="checkbox" name="dias" value="Terça"> Terça</label>
                <label><input type="checkbox" name="dias" value="Quarta"> Quarta</label>
                <label><input type="checkbox" name="dias" value="Quinta"> Quinta</label>
                <label><input type="checkbox" name="dias" value="Sexta"> Sexta</label>
                <label><input type="checkbox" name="dias" value="Sábado"> Sábado</label>
                <label><input type="checkbox" name="dias" value="Domingo"> Domingo</label>
            </div>

            <div class="form-grid">
                <div>
                    <label>Horário Início:</label>
                    <input type="time" id="horarioInicio" name="horarioInicio">
                </div>
                <div>
                    <label>Horário Fim:</label>
                    <input type="time" id="horarioFim" name="horarioFim">
                </div>
            </div>

            <label>Foto de Perfil:</label>
            <input type="file" id="photo" name="photo" accept="image/*">
            
            <button type="submit" class="btn-block mt-20">Salvar Perfil</button>
        </form>
    </div>
</div>

<script src="../js/petSitterProfileCreate.js" defer></script>
<script src="../js/auth.js" defer></script>
<script>
  // Validação de preço máximo nos inputs dinâmicos
  document.addEventListener('change', function(e) {
    if (e.target.type === 'number' && e.target.classList.contains('price-input')) {
      if (e.target.value && parseFloat(e.target.value) > 999999.99) {
        e.target.value = '999999.99';
      }
    }
  });
</script>
</body>
</html>
