<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body id="body-login">
<div class="container">

  <section id="section-login">
    <img src="../img/Logo_PetConnect.png" alt="PetConnect" class="logo" />
    <h2>Login</h2>
    <div id="div-login">
      <input type="email" id="email" placeholder="E-mail" />
      <input type="password" id="senha" placeholder="Senha" />
      <p id="recuperarSenha">
        <a href="#" id="link-recuperarSenha">Recuperar senha</a>
      </p>
      <button id="btnLogin">Entrar</button>
      <p id="mensagemErro" style="display:none; color:red; margin-top:7px;"></p>
      <p id="opcaoCadastro">
        Não tem conta? <a href="register.html">Cadastre-se</a>
      </p>
    </div>
  </section>

</div>
<script src="../js/auth.js"></script>
</body>
</html>
