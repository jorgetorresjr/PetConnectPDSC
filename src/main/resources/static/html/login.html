<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - PetConnect</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-container">
  <img src="../img/Logo_PetConnect.png" alt="PetConnect" class="logo" />
  <h1>PetConnect</h1>
  <p class="subtitle">Acesso ao Sistema</p>

  <form id="form-login">
    <input type="email" id="email" placeholder="E-mail" required />
    <input type="password" id="senha" placeholder="Senha" required />
    
    <p id="mensagemErro" class="hidden" style="color: var(--danger); margin-bottom: 10px; font-weight: bold;"></p>
    
    <button id="btnLogin" type="submit" class="btn-block">Entrar</button>
  </form>

  <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">

  <p style="margin-bottom: 10px;">Não possui conta?</p>
  <a href="register.html">Cadastre-se</a>
</div>

<script src="../js/auth.js"></script>
<script>
    setTimeout(() => { if (typeof setupLogoutButton === 'function') setupLogoutButton(); }, 500);
</script>
</body>
</html>
