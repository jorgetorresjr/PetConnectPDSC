<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Buscar pet sitteres - PetConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="../img/Logo_PetConnect.png" alt="Logo">
            <span>PetConnect</span>
        </div>
        <button id="btnLogout" class="btn-danger">Sair</button>
    </nav>

    <div class="dashboard-container">
        <button onclick="history.back()" class="btn-back">⬅ Voltar</button>
        
        <h2 class="page-title">Buscar Pet Sitters</h2>

        <div class="search-controls" style="margin-bottom: 20px;">
            <input 
                type="text" 
                id="buscaInput" 
                placeholder="Buscar por serviço ou nome..." 
                style="flex: 1;">
            <button id="btnBuscar">Buscar</button>
        </div>

        <div id="resultados" class="card-grid"></div>
    </div>

    <script src="../js/auth.js" defer></script>
    <script src="../js/petSitterSearch.js" defer></script>
    <script>
        setTimeout(() => { if (typeof setupLogoutButton === 'function') setupLogoutButton(); }, 500);
    </script>
</body>
</html>
